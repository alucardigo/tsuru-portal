service: tsuru-portal
image: bellube/tsuru-portal

servers:
  web:
    - <%= ENV.fetch("OCI_SERVER_IP", "IP_OCI_PENDENTE") %>
  job:
    hosts:
      - <%= ENV.fetch("OCI_SERVER_IP", "IP_OCI_PENDENTE") %>
    cmd: bin/jobs

proxy:
  ssl: true
  host: tsuru.bellube.com.br

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - SECRET_KEY_BASE
    - OTP_SECRET_KEY
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - SANKHYA_OAUTH_CLIENT_ID
    - SANKHYA_OAUTH_CLIENT_SECRET
    - SANKHYA_X_TOKEN
    - OCI_ACCESS_KEY_ID
    - OCI_SECRET_ACCESS_KEY
    - OCI_NAMESPACE
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_LOG_LEVEL: info
    RAILS_SERVE_STATIC_FILES: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  migrate: app exec "bin/rails db:migrate"

volumes:
  - "tsuru_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  args:
    RUBY_VERSION: "3.4.4"

ssh:
  user: ubuntu

# PostgreSQL como accessory na mesma VM (sem Redis!)
accessories:
  db:
    image: postgres:16-alpine
    host: <%= ENV.fetch("OCI_SERVER_IP", "IP_OCI_PENDENTE") %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: tsuru
        POSTGRES_DB: tsuru_portal_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - pgdata:/var/lib/postgresql/data
