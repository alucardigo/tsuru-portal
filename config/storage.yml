test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Oracle Object Storage (S3-compatível) — produção
# Secrets injetados pelo Kamal via ENV vars (não usar credentials aqui)
oci:
  service: S3
  endpoint: https://<%= ENV.fetch("OCI_NAMESPACE", "placeholder") %>.compat.objectstorage.sa-saopaulo-1.oraclecloud.com
  access_key_id: <%= ENV.fetch("OCI_ACCESS_KEY_ID", "placeholder") %>
  secret_access_key: <%= ENV.fetch("OCI_SECRET_ACCESS_KEY", "placeholder") %>
  region: sa-saopaulo-1
  bucket: tsuru-attachments
  force_path_style: true
