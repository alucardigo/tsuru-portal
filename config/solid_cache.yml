default: &default
  store_options:
    max_age: <%= 60.days.to_i %>
    max_size: <%= 256.megabytes %>
    namespace: <%= Rails.env %>

development:
  <<: *default
  connects_to:
    database:
      writing: cache
      reading: cache

test:
  <<: *default
  connects_to:
    database:
      writing: cache
      reading: cache

production:
  <<: *default
  connects_to:
    database:
      writing: cache
      reading: cache
